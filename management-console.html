<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>VVIP Management | Tables • Bands • Dashboard • Orders • History</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #0a0a0a;
            color: #ffffff;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
        }
        /* Premium Header */
        .premium-header {
            background: linear-gradient(135deg, #1a1a1a, #0f0f0f);
            border-radius: 32px;
            padding: 20px 32px;
            margin-bottom: 28px;
            border: 1px solid rgba(179,0,0,0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .logo-icon {
            font-size: 48px;
            background: linear-gradient(145deg, #b30000, #6a0000);
            width: 70px;
            height: 70px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .title h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #ff4d4d, #ffd966);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .title p {
            color: #ffd966;
            font-size: 13px;
        }
        .sync-status {
            background: #1a1a1a;
            padding: 8px 20px;
            border-radius: 60px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid #b30000;
        }
        .sync-dot {
            width: 10px;
            height: 10px;
            background: #00ff9c;
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }
        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            flex-wrap: wrap;
            background: #111;
            padding: 8px;
            border-radius: 60px;
        }
        .nav-tab {
            padding: 12px 28px;
            background: transparent;
            border: none;
            color: #aaa;
            font-weight: 600;
            cursor: pointer;
            border-radius: 40px;
            transition: all 0.2s;
        }
        .nav-tab.active {
            background: #b30000;
            color: white;
            box-shadow: 0 4px 12px rgba(179,0,0,0.4);
        }
        .nav-tab:hover:not(.active) {
            background: #2a2a2a;
            color: #ff4d4d;
        }
        /* Tab Content */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        /* Tables Grid */
        .tables-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .table-card {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #b30000;
            transition: transform 0.2s;
        }
        .table-card:hover {
            transform: translateY(-3px);
            border-color: #ff4d4d;
        }
        .table-name {
            font-size: 22px;
            font-weight: 700;
            color: #ff4d4d;
        }
        .progress-bar {
            width: 100%;
            background: #333;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #b30000;
            width: 0%;
            transition: width 0.3s;
        }
        .btn-small {
            background: #b30000;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            margin: 4px;
            transition: all 0.2s;
        }
        .btn-small:hover {
            background: #ff4d4d;
            transform: translateY(-1px);
        }
        .guest-badge {
            background: #b30000;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin: 2px;
        }
        /* Bands Table */
        .bands-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: #1a1a1a;
            border-radius: 24px;
            overflow: hidden;
        }
        .bands-table th, .bands-table td {
            padding: 14px 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        .bands-table th {
            background: #b30000;
            color: white;
            font-weight: 600;
        }
        .bands-table tr:hover {
            background: #222;
        }
        /* Dashboard */
        .dashboard-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            border: 1px solid #b30000;
        }
        .stat-card .value {
            font-size: 42px;
            font-weight: 800;
            color: #ff4d4d;
        }
        .dashboard-table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1a1a;
            border-radius: 24px;
            overflow: hidden;
        }
        .dashboard-table th, .dashboard-table td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
        }
        .dashboard-table th {
            background: #b30000;
            color: white;
        }
        /* Orders Grid */
        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .order-card {
            background: #1a1a1a;
            border-radius: 24px;
            padding: 20px;
            border: 2px solid #b30000;
            transition: all 0.2s;
        }
        .order-card.ready {
            border-color: #00ff9c;
            box-shadow: 0 0 20px rgba(0,255,156,0.2);
        }
        .order-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #b30000;
        }
        .order-id {
            background: #b30000;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
        }
        .status-pending {
            background: #ffaa00;
            color: #1a1a1a;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }
        .status-preparing {
            background: #00a86b;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
        }
        .status-ready {
            background: #b30000;
            color: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            animation: pulse 1s infinite;
        }
        .order-total {
            font-size: 20px;
            font-weight: bold;
            color: #00ff9c;
            margin: 15px 0;
            text-align: right;
        }
        .collect-btn {
            background: #00a86b;
            border: none;
            padding: 12px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s;
        }
        .collect-btn:disabled {
            background: #333;
            cursor: not-allowed;
        }
        .collect-btn:hover:not(:disabled) {
            background: #00cc7a;
            transform: translateY(-2px);
        }
        /* Create Table Form */
        .create-form {
            background: #111;
            padding: 20px;
            border-radius: 24px;
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-group label {
            font-size: 12px;
            color: #aaa;
        }
        .create-form input {
            background: #222;
            border: 1px solid #b30000;
            border-radius: 40px;
            padding: 10px 16px;
            color: white;
        }
        .create-btn {
            background: #b30000;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }
        /* Transaction History Styles */
        .history-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .history-stat-card {
            background: linear-gradient(135deg, #1a1a1a, #0f0f0f);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            border: 1px solid #b30000;
        }
        .history-stat-card .value {
            font-size: 36px;
            font-weight: 800;
            color: #ffd700;
        }
        .transaction-list {
            background: #1a1a1a;
            border-radius: 24px;
            overflow: hidden;
        }
        .transaction-item {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 16px 20px;
            border-bottom: 1px solid #333;
            transition: background 0.2s;
        }
        .transaction-item:hover {
            background: #222;
        }
        .transaction-icon {
            font-size: 32px;
            min-width: 50px;
            text-align: center;
        }
        .transaction-details {
            flex: 1;
        }
        .transaction-header {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 6px;
        }
        .transaction-vendor {
            font-weight: 700;
            color: #ff4d4d;
            background: rgba(179,0,0,0.2);
            padding: 2px 10px;
            border-radius: 30px;
            font-size: 12px;
        }
        .transaction-band {
            font-family: monospace;
            background: #2a2a2a;
            padding: 2px 8px;
            border-radius: 20px;
            font-size: 11px;
            color: #ffd966;
        }
        .transaction-amount {
            font-weight: 800;
            font-size: 16px;
            color: #00ff9c;
        }
        .transaction-item-name {
            color: #aaa;
            font-size: 13px;
        }
        .transaction-time {
            font-size: 11px;
            color: #666;
            font-family: monospace;
        }
        .empty-history {
            text-align: center;
            padding: 60px;
            color: #666;
            background: #111;
            border-radius: 24px;
        }
        /* Modal */
        .vvip-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(8px);
            z-index: 10000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        .vvip-modal.active {
            opacity: 1;
            visibility: visible;
        }
        .vvip-modal-card {
            background: linear-gradient(145deg, #1f1f1f, #0a0a0a);
            border-radius: 48px;
            border: 2px solid #b30000;
            max-width: 420px;
            width: 90%;
            padding: 32px;
            text-align: center;
        }
        .vvip-modal-btn {
            background: #b30000;
            border: none;
            padding: 12px 32px;
            border-radius: 60px;
            color: white;
            cursor: pointer;
            margin-top: 20px;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.6; }
            100% { opacity: 1; }
        }
        @media (max-width: 768px) {
            .nav-tabs { border-radius: 20px; }
            .nav-tab { padding: 8px 16px; font-size: 12px; }
            .tables-grid, .orders-grid { grid-template-columns: 1fr; }
            .transaction-item { flex-wrap: wrap; }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Premium Header -->
    <div class="premium-header">
        <div class="logo-area">
            <div class="logo-icon">👑</div>
            <div class="title">
                <h1>VVIP MANAGEMENT CONSOLE</h1>
                <p>Tables • Bands • Dashboard • Orders • Transaction History</p>
            </div>
        </div>
        <div class="sync-status">
            <div class="sync-dot"></div>
            <div>LIVE SYNC with POS</div>
        </div>
    </div>

    <!-- Navigation Tabs - Includes History -->
    <div class="nav-tabs">
        <button class="nav-tab active" onclick="switchTab('tables')">📋 TABLES</button>
        <button class="nav-tab" onclick="switchTab('bands')">🖨️ BANDS</button>
        <button class="nav-tab" onclick="switchTab('dashboard')">📊 DASHBOARD</button>
        <button class="nav-tab" onclick="switchTab('orders')">👨‍🍳 ORDERS</button>
        <button class="nav-tab" onclick="switchTab('history')">📜 HISTORY</button>
    </div>

    <!-- TABLES TAB -->
    <div id="tablesTab" class="tab-content active">
        <div class="create-form">
            <div class="form-group">
                <label>📌 Table Name</label>
                <input type="text" id="newTableName" placeholder="e.g., VIP Lounge">
            </div>
            <div class="form-group">
                <label>👥 Capacity</label>
                <input type="number" id="newTableCapacity" placeholder="Max guests" value="10">
            </div>
            <div class="form-group">
                <label>💰 Tab Amount (R)</label>
                <input type="number" id="newTableTab" placeholder="Initial tab" value="8000">
            </div>
            <button class="create-btn" onclick="createTable()">+ CREATE TABLE</button>
        </div>
        <div id="tablesList" class="tables-grid"></div>
    </div>

    <!-- BANDS TAB -->
    <div id="bandsTab" class="tab-content">
        <div id="bandsListContainer"></div>
    </div>

    <!-- DASHBOARD TAB -->
    <div id="dashboardTab" class="tab-content">
        <div id="dashboardContent"></div>
    </div>

    <!-- ACTIVE ORDERS TAB -->
    <div id="ordersTab" class="tab-content">
        <div id="activeOrdersGrid" class="orders-grid"></div>
    </div>

    <!-- TRANSACTION HISTORY TAB -->
    <div id="historyTab" class="tab-content">
        <div id="historyContent"></div>
    </div>
</div>

<!-- VVIP Modal -->
<div id="vvipModal" class="vvip-modal">
    <div class="vvip-modal-card">
        <div class="vvip-modal-icon" id="modalIcon" style="font-size:64px;">👑</div>
        <div class="vvip-modal-title" id="modalTitle" style="font-size:28px; font-weight:800; color:#ff4d4d; margin:12px 0;">Notification</div>
        <div class="vvip-modal-message" id="modalMessage" style="margin:20px 0; color:#ddd;">Message</div>
        <button class="vvip-modal-btn" onclick="closeModal()">Confirm</button>
    </div>
</div>

<script>
    // ==================== VVIP MANAGEMENT with TRANSACTION HISTORY ====================
    // All data shared with main POS via localStorage - FULL SYNC
    
    let walletAccounts = {};
    let tables = {};
    let revenue = 0;
    let guests = 0;
    let globalOrders = [];
    let transactionHistory = [];
    let vendorSales = { "Rands Smart Counter":0, "Shisha Lounge":0, "The Butcher Shop":0 };
    
    function loadAll() {
        const walletsRaw = localStorage.getItem('rands_wallet_accounts');
        if (walletsRaw) {
            const accounts = JSON.parse(walletsRaw);
            walletAccounts = {};
            accounts.forEach(acc => { walletAccounts[acc.id] = acc; });
        }
        tables = JSON.parse(localStorage.getItem('tables') || '{}');
        revenue = parseFloat(localStorage.getItem('revenue') || '0');
        guests = parseInt(localStorage.getItem('guests') || '0');
        globalOrders = JSON.parse(localStorage.getItem('globalOrders') || '[]');
        transactionHistory = JSON.parse(localStorage.getItem('transactionHistory') || '[]');
        vendorSales = JSON.parse(localStorage.getItem('vendorSales') || '{"Rands Smart Counter":0,"Shisha Lounge":0,"The Butcher Shop":0}');
    }
    
    function saveAll() {
        localStorage.setItem('tables', JSON.stringify(tables));
        localStorage.setItem('revenue', revenue);
        localStorage.setItem('guests', guests);
        localStorage.setItem('globalOrders', JSON.stringify(globalOrders));
        localStorage.setItem('transactionHistory', JSON.stringify(transactionHistory));
        localStorage.setItem('vendorSales', JSON.stringify(vendorSales));
        localStorage.setItem('rands_wallet_accounts', JSON.stringify(Object.values(walletAccounts)));
        
        if (window.BroadcastChannel) {
            const channel = new BroadcastChannel('vvip_sync');
            channel.postMessage({ type: 'DATA_UPDATED', timestamp: Date.now() });
            channel.close();
        }
    }
    
    function showModal(title, message, icon = "👑") {
        document.getElementById("modalTitle").innerText = title;
        document.getElementById("modalMessage").innerHTML = message;
        document.getElementById("modalIcon").innerHTML = icon;
        document.getElementById("vvipModal").classList.add("active");
    }
    function closeModal() { document.getElementById("vvipModal").classList.remove("active"); }
    
    // ========== TABLES MANAGEMENT ==========
    function renderTables() {
        const container = document.getElementById("tablesList");
        if (!container) return;
        if (Object.keys(tables).length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:60px; color:#666; background:#111; border-radius:32px;">✨ No tables yet. Create your first table above.</div>';
            return;
        }
        container.innerHTML = Object.entries(tables).map(([name, t]) => {
            const original = t.originalTab || t.tabBalance;
            const spent = original - t.tabBalance;
            const percent = original > 0 ? (spent / original) * 100 : 0;
            return `
                <div class="table-card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
                        <span class="table-name">${escapeHtml(name)}</span>
                        <span style="color:#00ff9c; font-weight:bold;">Tab: R${t.tabBalance}</span>
                    </div>
                    <div style="margin-bottom:12px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:6px;">
                            <span>👥 Guests: ${t.entriesUsed}/${t.capacity}</span>
                            <span>💰 Spent: R${spent} / R${original}</span>
                        </div>
                        <div class="progress-bar"><div class="progress-fill" style="width:${percent}%;"></div></div>
                    </div>
                    <div style="display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap;">
                        <input type="text" id="assign_${name.replace(/\s/g, '_')}" placeholder="Wallet ID" style="flex:1; padding:8px 12px; background:#222; border:1px solid #b30000; border-radius:40px; color:white;">
                        <button onclick="assignToTable('${escapeHtml(name).replace(/'/g, "\\'")}')" class="btn-small">➕ Assign</button>
                        <button onclick="unassignFromTable('${escapeHtml(name).replace(/'/g, "\\'")}')" class="btn-small">🗑️ Remove</button>
                    </div>
                    <div>
                        <span style="color:#aaa; font-size:12px;">Assigned:</span>
                        <div style="margin-top:8px;">${t.guests.map(g => `<span class="guest-badge">${escapeHtml(g)}</span>`).join('') || '<span style="color:#666; font-size:12px;">No guests assigned</span>'}</div>
                    </div>
                </div>
            `;
        }).join('');
    }
    
    function escapeHtml(str) { return str.replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
    
    function createTable() {
        let name = document.getElementById("newTableName").value.trim();
        let capacity = parseInt(document.getElementById("newTableCapacity").value);
        let tab = parseInt(document.getElementById("newTableTab").value);
        if (!name || capacity < 1) { showModal("Error", "Valid name and capacity required", "⚠️"); return; }
        if (tables[name]) { showModal("Duplicate", "Table already exists", "⚠️"); return; }
        tables[name] = { name, capacity, tabBalance: tab, entriesUsed: 0, guests: [], originalTab: tab };
        revenue += 2000;
        saveAll();
        renderTables();
        showModal("Table Created", `${name} created with R${tab} tab + R2000 setup fee`, "🎉");
        document.getElementById("newTableName").value = "";
    }
    
    function assignToTable(tableName) {
        const inputId = `assign_${tableName.replace(/\s/g, '_')}`;
        const walletId = document.getElementById(inputId)?.value.trim();
        if (!walletId) { showModal("Error", "Enter a Wallet ID", "⚠️"); return; }
        if (!walletAccounts[walletId]) {
            if (confirm(`Wallet "${walletId}" not found. Create new?`)) {
                walletAccounts[walletId] = { id: walletId, name: "Guest", balance: 0, pin: "0000", tableTab: 0, tableName: null };
                saveAll();
            } else return;
        }
        const table = tables[tableName];
        if (!table) { showModal("Error", "Table not found", "⚠️"); return; }
        if (table.guests.includes(walletId)) { showModal("Already Assigned", `${walletId} already at this table`, "⚠️"); return; }
        if (table.guests.length >= table.capacity) { showModal("Table Full", `${tableName} at capacity (${table.capacity})`, "🚫"); return; }
        table.guests.push(walletId);
        table.entriesUsed = table.guests.length;
        if (walletAccounts[walletId]) walletAccounts[walletId].tableName = tableName;
        saveAll();
        renderTables();
        showModal("Assigned", `${walletId} → ${tableName}`, "✅");
        if (document.getElementById(inputId)) document.getElementById(inputId).value = "";
    }
    
    function unassignFromTable(tableName) {
        const walletId = prompt("Enter Wallet ID to remove from this table:");
        if (!walletId) return;
        const table = tables[tableName];
        if (!table) { showModal("Error", "Table not found", "⚠️"); return; }
        const idx = table.guests.indexOf(walletId);
        if (idx !== -1) {
            table.guests.splice(idx, 1);
            table.entriesUsed = table.guests.length;
            if (walletAccounts[walletId]) delete walletAccounts[walletId].tableName;
            saveAll();
            renderTables();
            showModal("Removed", `${walletId} removed from ${tableName}`, "🗑️");
        } else {
            showModal("Not Found", `${walletId} not at this table`, "⚠️");
        }
    }
    
    // ========== BANDS MANAGEMENT ==========
    function renderBands() {
        const container = document.getElementById("bandsListContainer");
        if (!container) return;
        if (Object.keys(walletAccounts).length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:60px; color:#666; background:#111; border-radius:32px;">💳 No wristbands registered yet. Create tables and assign guests to generate bands.</div>';
            return;
        }
        container.innerHTML = `
            <table class="bands-table">
                <thead><tr><th>🆔 Wallet ID</th><th>👤 Name</th><th>💰 Balance</th><th>📋 Assigned Table</th><th>🖨️ Action</th></tr></thead>
                <tbody>
                    ${Object.entries(walletAccounts).map(([id, acc]) => `
                        <tr>
                            <td style="font-family:monospace;">${escapeHtml(id)}</td>
                            <td>${escapeHtml(acc.name || '-')}</td>
                            <td style="color:#00ff9c;">R${acc.balance || 0}</td>
                            <td>${acc.tableName ? escapeHtml(acc.tableName) : '<span style="color:#666;">—</span>'}</td>
                            <td><button onclick="printBand('${id.replace(/'/g, "\\'")}')" class="btn-small">🖨️ Print Wristband</button></td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>
            <div style="margin-top:20px; padding:16px; background:#111; border-radius:24px; text-align:center; color:#888; font-size:13px;">
                💡 Total Bands: ${Object.keys(walletAccounts).length} | Total Balance: R${Object.values(walletAccounts).reduce((s, a) => s + (a.balance || 0), 0)}
            </div>
        `;
    }
    
    function printBand(bandId) {
        const account = walletAccounts[bandId];
        if (!account) { showModal("Error", "Band not found", "⚠️"); return; }
        const printWindow = window.open('', '_blank');
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(bandId)}`;
        printWindow.document.write(`
            <!DOCTYPE html><html><head><title>VVIP Wristband - ${bandId}</title>
            <style>body{margin:0;padding:20px;background:white;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:Arial;}
            .wristband{width:320px;background:linear-gradient(145deg,#b30000,#6a0000);border-radius:40px;padding:30px;text-align:center;color:white;}
            .logo{font-size:36px;margin-bottom:15px;}.band-id{font-size:26px;font-weight:bold;margin:15px 0;background:rgba(255,255,255,0.2);padding:10px;border-radius:50px;}
            .qr{background:white;padding:15px;border-radius:24px;display:inline-block;margin:15px 0;}.qr img{width:150px;height:150px;}</style>
            <body><div class="wristband"><div class="logo">👑 RANDS VVIP</div><div class="band-id">${bandId}</div><div class="qr"><img src="${qrUrl}"></div><div class="footer">Present this wristband for access</div></div></body></html>
        `);
        printWindow.document.close();
        printWindow.print();
    }
    
    // ========== DASHBOARD ==========
    function renderDashboard() {
        const container = document.getElementById("dashboardContent");
        if (!container) return;
        const totalTables = Object.keys(tables).length;
        const occupiedTables = Object.values(tables).filter(t => t.entriesUsed > 0).length;
        const totalGuests = Object.values(tables).reduce((sum, t) => sum + t.entriesUsed, 0);
        const totalTabRemaining = Object.values(tables).reduce((sum, t) => sum + (t.tabBalance || 0), 0);
        const totalTabSpent = Object.values(tables).reduce((sum, t) => sum + ((t.originalTab || t.tabBalance) - (t.tabBalance || 0)), 0);
        container.innerHTML = `
            <div class="dashboard-stats">
                <div class="stat-card"><div class="value">${totalTables}</div><div>Total Tables</div></div>
                <div class="stat-card"><div class="value">${occupiedTables}</div><div>Occupied Tables</div></div>
                <div class="stat-card"><div class="value">${totalGuests}</div><div>Total Guests</div></div>
                <div class="stat-card"><div class="value">R${totalTabSpent}</div><div>Tab Spent</div></div>
                <div class="stat-card"><div class="value">R${totalTabRemaining}</div><div>Tab Remaining</div></div>
                <div class="stat-card"><div class="value">R${revenue}</div><div>Total Revenue</div></div>
            </div>
            <h3 style="margin:24px 0 16px; color:#ff4d4d;">📊 Table Breakdown</h3>
            <table class="dashboard-table"><thead><tr><th>Table Name</th><th>Capacity</th><th>Guests</th><th>Tab Balance</th><th>Tab Spent</th><th>Usage</th></tr></thead>
            <tbody>${Object.entries(tables).map(([name, t]) => {
                const original = t.originalTab || t.tabBalance;
                const spent = original - t.tabBalance;
                const percent = original > 0 ? (spent / original) * 100 : 0;
                return `<tr><td><strong>${escapeHtml(name)}</strong></td><td>${t.capacity}</td><td>${t.entriesUsed}/${t.capacity}</td><td style="color:#00ff9c;">R${t.tabBalance}</td><td>R${spent}</td><td><div class="progress-bar" style="width:100px;"><div class="progress-fill" style="width:${percent}%;"></div></div></td></tr>`;
            }).join('')}</tbody></table>
            <div style="margin-top:24px; background:#111; padding:20px; border-radius:24px;">
                <h4 style="color:#ffd966;">💰 Vendor Sales Breakdown</h4>
                <div style="display:flex; gap:24px; flex-wrap:wrap; margin-top:12px;">
                    <div>🍺 Rands Smart Counter: <strong style="color:#00ff9c;">R${vendorSales["Rands Smart Counter"] || 0}</strong></div>
                    <div>💨 Shisha Lounge: <strong style="color:#00ff9c;">R${vendorSales["Shisha Lounge"] || 0}</strong></div>
                    <div>🥩 The Butcher Shop: <strong style="color:#00ff9c;">R${vendorSales["The Butcher Shop"] || 0}</strong></div>
                </div>
            </div>
        `;
    }
    
    // ========== ACTIVE ORDERS ==========
    function renderOrders() {
        const container = document.getElementById("activeOrdersGrid");
        if (!container) return;
        const activeOrders = globalOrders.filter(o => o.status !== "collected");
        if (activeOrders.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:60px; color:#666; background:#111; border-radius:32px;">🍽️ No active orders. Orders from POS will appear here.</div>';
            return;
        }
        container.innerHTML = activeOrders.map(order => {
            let statusClass = "", statusText = "", readyClass = "";
            if (order.status === "pending") { statusClass = "status-pending"; statusText = "PENDING"; }
            else if (order.status === "preparing") { statusClass = "status-preparing"; statusText = "PREPARING"; }
            else if (order.status === "ready") { statusClass = "status-ready"; statusText = "READY"; readyClass = "ready"; }
            let vendorIcon = order.vendor === "Rands Smart Counter" ? "🍺" : order.vendor === "Shisha Lounge" ? "💨" : "🥩";
            return `<div class="order-card ${readyClass}"><div class="order-header"><span class="order-id">#${order.orderId}</span><span style="color:#888; font-size:12px;">${order.timestamp}</span></div>
            <div style="margin-bottom:12px;">${vendorIcon} <strong>${order.vendor}</strong> | Band: ${order.bandId}</div>
            <div class="${statusClass}" style="margin-bottom:12px;">${statusText}</div>
            <div style="margin:12px 0;">${order.items.map(item => `<div style="display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px solid #333;"><span>${item.quantity}x ${item.name}</span><span>R${item.price * item.quantity}</span></div>`).join('')}</div>
            <div class="order-total">Total: R${order.total}</div>
            <button class="collect-btn" onclick="collectOrder(${order.orderId})" ${order.status !== "ready" ? "disabled" : ""}>${order.status === "ready" ? "📦 COLLECT ORDER" : "⏳ WAITING FOR KITCHEN"}</button></div>`;
        }).join('');
    }
    
    function collectOrder(orderId) {
        const idx = globalOrders.findIndex(o => o.orderId === orderId);
        if (idx !== -1 && globalOrders[idx].status === "ready") {
            globalOrders[idx].status = "collected";
            saveAll();
            renderOrders();
            showModal("Order Collected", `Order #${orderId} has been marked as collected.`, "📦");
        }
    }
    
    // ========== TRANSACTION HISTORY ==========
    function renderHistory() {
        const container = document.getElementById("historyContent");
        if (!container) return;
        const history = transactionHistory || [];
        const totalSpent = history.reduce((sum, tx) => sum + tx.amount, 0);
        const uniqueBands = new Set(history.map(tx => tx.band)).size;
        const vendorCounts = {};
        history.forEach(tx => { vendorCounts[tx.vendor] = (vendorCounts[tx.vendor] || 0) + 1; });
        const topVendor = Object.entries(vendorCounts).sort((a,b) => b[1] - a[1])[0]?.[0] || '-';
        
        if (history.length === 0) {
            container.innerHTML = '<div class="empty-history">✨ No transactions yet. Make a purchase from POS to see VVIP transaction ledger.</div>';
            return;
        }
        
        container.innerHTML = `
            <div class="history-stats">
                <div class="history-stat-card"><div class="value">R${totalSpent.toFixed(2)}</div><div>Total Spent</div></div>
                <div class="history-stat-card"><div class="value">${history.length}</div><div>Transactions</div></div>
                <div class="history-stat-card"><div class="value">${uniqueBands}</div><div>Unique Customers</div></div>
                <div class="history-stat-card"><div class="value">${topVendor !== '-' ? topVendor.split(' ')[0] : '-'}</div><div>Top Vendor</div></div>
            </div>
            <div class="transaction-list">
                ${history.slice(0, 50).map(tx => {
                    let vendorIcon = tx.vendor === "Rands Smart Counter" ? "🍺" : tx.vendor === "Shisha Lounge" ? "💨" : "🥩";
                    return `
                        <div class="transaction-item">
                            <div class="transaction-icon">${vendorIcon}</div>
                            <div class="transaction-details">
                                <div class="transaction-header">
                                    <span class="transaction-vendor">${tx.vendor}</span>
                                    <span class="transaction-band">👤 ${tx.band || 'guest'}</span>
                                    <span class="transaction-amount">+R${tx.amount}</span>
                                </div>
                                <div class="transaction-item-name">${tx.quantity || 1}x ${tx.item}</div>
                                <div class="transaction-time">⏱️ ${tx.time || new Date().toLocaleTimeString()}</div>
                            </div>
                        </div>
                    `;
                }).join('')}
            </div>
            ${history.length > 50 ? '<div style="text-align:center; padding:16px; color:#666;">Showing last 50 transactions</div>' : ''}
        `;
    }
    
    // ========== TAB SWITCHING ==========
    function switchTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.getElementById(`${tab}Tab`).classList.add('active');
        event.target.classList.add('active');
        if (tab === 'tables') renderTables();
        if (tab === 'bands') renderBands();
        if (tab === 'dashboard') renderDashboard();
        if (tab === 'orders') renderOrders();
        if (tab === 'history') renderHistory();
    }
    
    // ========== INIT & REAL-TIME SYNC ==========
    function initSync() {
        loadAll();
        renderTables();
        renderBands();
        renderDashboard();
        renderOrders();
        renderHistory();
        
        if (window.BroadcastChannel) {
            const channel = new BroadcastChannel('vvip_sync');
            channel.onmessage = () => {
                loadAll();
                renderTables();
                renderBands();
                renderDashboard();
                renderOrders();
                renderHistory();
            };
        }
        
        setInterval(() => {
            loadAll();
            if (document.getElementById('tablesTab').classList.contains('active')) renderTables();
            if (document.getElementById('bandsTab').classList.contains('active')) renderBands();
            if (document.getElementById('dashboardTab').classList.contains('active')) renderDashboard();
            if (document.getElementById('ordersTab').classList.contains('active')) renderOrders();
            if (document.getElementById('historyTab').classList.contains('active')) renderHistory();
        }, 3000);
    }
    
    window.switchTab = switchTab;
    window.createTable = createTable;
    window.assignToTable = assignToTable;
    window.unassignFromTable = unassignFromTable;
    window.printBand = printBand;
    window.collectOrder = collectOrder;
    window.closeModal = closeModal;
    
    initSync();
</script>
</body>
</html>
